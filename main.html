<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Headings */
    .block-heading h2 {
      color: #3b99e0;
      text-align: center;
    }

    /* Summary block */
    .summary {
      border-top: 2px solid #5ea4f3;
      background-color: #f7fbff;
      padding: 20px;
    }

    .summary .summary-item {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }

    .summary button {
      background-color: #3b99e0;
      color: white;
      width: 100%;
      border: none;
      padding: 10px;
    }

    .summary button:hover {
      background-color: #2d83c5;
    }

    /* Product block */
    .product {
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

<div class="container mt-5">

  <!-- Block Heading -->
  <div class="block-heading">
    <h2>Shopping Cart</h2>
  </div>

  <div class="row mt-4">

    <!-- Products Section -->
    <div class="col-lg-8">

      <!-- Product 1 -->
      <div class="product">
        <div class="row align-items-center">
          <div class="col-md-4">
            <img src="https://via.placeholder.com/150" class="img-fluid" alt="Product">
          </div>
          <div class="col-md-8">
            <h5>Product 1</h5>
            <p>Description of product 1</p>
            <p>Price: $50</p>
          </div>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="product">
        <div class="row align-items-center">
          <div class="col-md-4">
            <img src="https://via.placeholder.com/150" class="img-fluid" alt="Product">
          </div>
          <div class="col-md-8">
            <h5>Product 2</h5>
            <p>Description of product 2</p>
            <p>Price: $30</p>
          </div>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="product">
        <div class="row align-items-center">
          <div class="col-md-4">
            <img src="https://www.amazon.in/iPhone-16-Pro-256-GB/dp/B0DGJ6151N" class="img-fluid" alt="Product">
          </div>
          <div class="col-md-8">
            <h5>Product 3</h5>
            <p>Description of product 3</p>
            <p>Price: $20</p>
          </div>
        </div>
      </div>

    </div>

    <!-- Summary Section -->
    <div class="col-lg-4">
      <div class="summary">
        <h4>Summary</h4>

        <div class="summary-item d-flex justify-content-between">
          <span>Subtotal</span>
          <span>$360</span>
        </div>

        <div class="summary-item d-flex justify-content-between">
          <span>Discount</span>
          <span>$0</span>
        </div>
		  <div class="summary-item d-flex justify-content-between">
          <span>Shipping</span>
          <span>$0</span>
        </div>

        <div class="summary-item d-flex justify-content-between">
          <strong>Total</strong>
          <strong>$110</strong>
        </div>

        <button class="btn mt-3">Checkout</button>
      </div>
    </div>

  </div>
</div>

</body>
</html>
